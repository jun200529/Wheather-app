<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App Pro</title>

    <link rel="icon" type="image/svg+xml" href="assets/logos/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/animations.css">

    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <header>

        <div class="logo">

            <img src="assets/logos/favicon.svg" alt="Weather App Logo">

            <h1>Weather App Pro</h1>

        </div>

        <button id="themeButton">

            🌙

        </button>

    </header>

    <main>

        <!-- ========================= -->
        <!-- BUSCADOR -->
        <!-- ========================= -->

        <section class="search">

            <h2>Search any city</h2>

            <div class="search-box">

                <input
                    type="text"
                    id="city"
                    placeholder="Example: Medellín">

                <button id="searchButton">

                    Search

                </button>

            </div>

        </section>

        <!-- ========================= -->
        <!-- CLIMA ACTUAL -->
        <!-- ========================= -->

        <section class="weather-card">

            <h2 id="cityName">

                Medellín

            </h2>

            <img
                id="weatherIcon"
                src="assets/icons/sun.svg"
                alt="Weather Icon">

            <h3 id="temperature">

                24°C

            </h3>

            <p id="description">

                Partly Cloudy

            </p>

        </section>

        <!-- ========================= -->
        <!-- DETALLES -->
        <!-- ========================= -->

        <section class="details">

            <div class="detail-card">

                <h4>Humidity</h4>

                <p id="humidity">

                    73%

                </p>

            </div>

            <div class="detail-card">

                <h4>Wind</h4>

                <p id="wind">

                    15 km/h

                </p>

            </div>

            <div class="detail-card">

                <h4>Feels Like</h4>

                <p id="feelsLike">

                    26°C

                </p>

            </div>

            <div class="detail-card">

                <h4>Visibility</h4>

                <p id="visibility">

                    10 km

                </p>

            </div>

        </section>

        <!-- ========================= -->
        <!-- PRONÓSTICO -->
        <!-- ========================= -->

        <section class="forecast">

            <h2>

                7 Day Forecast

            </h2>

            <div id="forecastContainer">

                <!-- JavaScript agregará las tarjetas -->

            </div>

        </section>

        <!-- ========================= -->
        <!-- FAVORITOS -->
        <!-- ========================= -->

        <section class="favorites">

            <h2>

                Favorite Cities

            </h2>

            <div id="favoritesContainer">

                <!-- JavaScript agregará las ciudades -->

            </div>

        </section>

    </main>

    <footer>

        <p>

            Developed by Juan Sebastián Osorio © 2026

        </p>

    </footer>

    <script src="js/utils.js"></script>

    <script src="js/storage.js"></script>

    <script src="js/api.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
